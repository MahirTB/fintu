{% extends 'base.html' %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <h2>Welcome to fintu</h2>
            <p>Please log in to manage your finances</p>
        </div>
        
        <form method="POST" action="/login">
            {% if error %}
            <div class="error-banner">
                {{ error }}
            </div>
            {% endif %}
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="submit-btn login-btn">Log In</button>
        </form>
    </div>
</div>
{% endblock %}
