<div class="dashboard-summary" id="summary-section" {% if oob %}hx-swap-oob="true"{% endif %}>
    <div class="stat-card balance">
        <div class="stat-header">
            <span class="label">Net Balance</span>
            <div class="stat-icon balance">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
            </div>
        </div>
        <span class="value">৳{{ "{:,.2f}".format(summary.balance) }}</span>
    </div>
    <div class="stat-card income">
        <div class="stat-header">
            <span class="label">Total Income</span>
            <div class="stat-icon income">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 7-8.5 8.5-5-5L2 17"/><polyline points="22 7 16 7 22 13"/></svg>
            </div>
        </div>
        <span class="value">৳{{ "{:,.2f}".format(summary.income) }}</span>
    </div>
    <div class="stat-card expense">
        <div class="stat-header">
            <span class="label">Total Expenses</span>
            <div class="stat-icon expense">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 17-8.5-8.5-5 5L2 7"/><polyline points="22 17 16 17 22 11"/></svg>
            </div>
        </div>
        <span class="value">৳{{ "{:,.2f}".format(summary.expense) }}</span>
    </div>
</div>
